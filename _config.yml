title: ShakeChef AI
description: Discover AI-powered recipe inspiration with a shake of your phone! Turn your available ingredients into delicious meals instantly.
baseurl: ""
url: "https://trimeradev.github.io"

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Collections
collections:
  recipes:
    output: true
    permalink: /recipes/:path/

defaults:
  - scope:
      path: ""
      type: "recipes"
    values:
      layout: "recipe"

# SEO settings
lang: en_US
social:
  name: ShakeChef AI
  links:
    - https://github.com/TrimeraDev/Schuettelgericht

# Analytics (you'll need to add your tracking ID)
# google_analytics: UA-XXXXXXXX-X
